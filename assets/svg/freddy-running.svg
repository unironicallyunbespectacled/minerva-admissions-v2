<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="fur">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2" xChannelSelector="R" yChannelSelector="G" />
    </filter>
    <filter id="blur">
      <feGaussianBlur stdDeviation="3 0" />
    </filter>
  </defs>
  <g filter="url(#fur)">
    <!-- Body (stretched out) -->
    <ellipse cx="50" cy="50" rx="35" ry="15" fill="#333" />
    <!-- Head -->
    <ellipse cx="80" cy="45" rx="15" ry="12" fill="#333" />
    <!-- Ears (flattened) -->
    <polygon points="75,35 65,25 70,40" fill="#333" />
    <polygon points="85,35 95,30 90,40" fill="#333" />
    <!-- Legs (stretched) -->
    <path d="M 65 55 L 85 75" fill="none" stroke="#333" stroke-width="8" stroke-linecap="round" />
    <path d="M 55 55 L 70 70" fill="none" stroke="#222" stroke-width="8" stroke-linecap="round" />
    <path d="M 35 55 L 15 70" fill="none" stroke="#333" stroke-width="8" stroke-linecap="round" />
    <path d="M 25 55 L 10 65" fill="none" stroke="#222" stroke-width="8" stroke-linecap="round" />
    <!-- Tail (motion blur) -->
    <path d="M 15 45 L -5 45" fill="none" stroke="#333" stroke-width="10" stroke-linecap="round" filter="url(#blur)" />
    <!-- Eyes -->
    <circle cx="85" cy="42" r="2" fill="#FFF" />
  </g>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="fur">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </defs>
  <!-- Sparkles -->
  <g fill="#C9A84C">
    <path d="M 15 20 Q 20 20 20 15 Q 20 20 25 20 Q 20 20 20 25 Q 20 20 15 20" />
    <path d="M 80 25 Q 85 25 85 20 Q 85 25 90 25 Q 85 25 85 30 Q 85 25 80 25" transform="scale(0.8) translate(20, 10)" />
  </g>
  <g filter="url(#fur)">
    <!-- Body -->
    <ellipse cx="50" cy="65" rx="30" ry="25" fill="#333" />
    <path d="M 20 65 Q 50 90 80 65 Z" fill="#222" />
    <!-- Head -->
    <circle cx="50" cy="40" r="25" fill="#333" />
    <!-- Ears -->
    <polygon points="25,30 35,10 45,25" fill="#333" />
    <polygon points="75,30 65,10 55,25" fill="#333" />
    <polygon points="30,25 35,15 40,25" fill="#F4C2C2" />
    <polygon points="70,25 65,15 60,25" fill="#F4C2C2" />
    <!-- Tail -->
    <path d="M 75 75 Q 95 75 90 55 Q 85 45 75 50" fill="none" stroke="#333" stroke-width="12" stroke-linecap="round" />
    <!-- Eyes (smirking) -->
    <path d="M 35 38 Q 40 35 45 38" fill="none" stroke="#FFF" stroke-width="3" stroke-linecap="round" />
    <path d="M 55 38 Q 60 35 65 38" fill="none" stroke="#FFF" stroke-width="3" stroke-linecap="round" />
    <!-- Nose/Mouth (smirk) -->
    <polygon points="48,48 52,48 50,52" fill="#F4C2C2" />
    <path d="M 50 52 Q 55 58 65 52" fill="none" stroke="#222" stroke-width="2" stroke-linecap="round" />
    <!-- Paws -->
    <circle cx="35" cy="85" r="6" fill="#444" />
    <circle cx="65" cy="85" r="6" fill="#444" />
  </g>
</svg>